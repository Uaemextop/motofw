name: "Copilot Setup Steps"

# This workflow provisions the development environment used by GitHub Copilot
# Coding Agent before it starts working on tasks in this repository.
# Reference: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    # GitHub Enterprise self-hosted runner with label "mp4"
    runs-on: [self-hosted, mp4]

    permissions:
      contents: read

    steps:
      # ── 1. Checkout this repository ───────────────────────────────────────
      - name: Checkout motofw repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 3. System utilities ───────────────────────────────────────────────
      - name: Install system utilities (curl, wget, unzip)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl wget unzip zip git

      # ── 4. Node.js ────────────────────────────────────────────────────────
      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      # ── 5. Eclipse Temurin JDK 21 ─────────────────────────────────────────
      - name: Set up Eclipse Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # ── 6. Smali / Baksmali (DEX ↔ Smali assembler/disassembler) ─────────
      - name: Install smali & baksmali
        run: |
          SMALI_VERSION="2.5.2"
          SMALI_BASE="https://github.com/JesusFreke/smali/releases/download/v${SMALI_VERSION}"
          sudo curl -sSL "${SMALI_BASE}/smali-${SMALI_VERSION}.jar"   -o /usr/local/lib/smali.jar
          sudo curl -sSL "${SMALI_BASE}/baksmali-${SMALI_VERSION}.jar" -o /usr/local/lib/baksmali.jar

          # Create executable wrappers
          echo '#!/bin/sh\nexec java -jar /usr/local/lib/smali.jar "$@"'    | sudo tee /usr/local/bin/smali    > /dev/null
          echo '#!/bin/sh\nexec java -jar /usr/local/lib/baksmali.jar "$@"' | sudo tee /usr/local/bin/baksmali > /dev/null
          sudo chmod +x /usr/local/bin/smali /usr/local/bin/baksmali

      # ── 7. Apktool (APK decompilation / recompilation) ───────────────────
      - name: Install apktool
        run: |
          APKTOOL_VERSION="2.9.3"
          sudo curl -sSL \
            "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar" \
            -o /usr/local/lib/apktool.jar
          echo '#!/bin/sh\nexec java -jar /usr/local/lib/apktool.jar "$@"' | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool

      # ── 8. Simplify (smali deobfuscator) ─────────────────────────────────
      - name: Install simplify (smali deobfuscator)
        run: |
          SIMPLIFY_VERSION="1.0.1"
          sudo curl -sSL \
            "https://github.com/CalebFenton/simplify/releases/download/v${SIMPLIFY_VERSION}/simplify-${SIMPLIFY_VERSION}.jar" \
            -o /usr/local/lib/simplify.jar
          echo '#!/bin/sh\nexec java -jar /usr/local/lib/simplify.jar "$@"' | sudo tee /usr/local/bin/simplify > /dev/null
          sudo chmod +x /usr/local/bin/simplify

      # ── 9. JADX (Java / Kotlin decompiler) ───────────────────────────────
      - name: Install JADX
        run: |
          JADX_VERSION="1.5.0"
          curl -sSL \
            "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" \
            -o /tmp/jadx.zip
          sudo unzip -q /tmp/jadx.zip -d /opt/jadx
          sudo ln -sf /opt/jadx/bin/jadx      /usr/local/bin/jadx
          sudo ln -sf /opt/jadx/bin/jadx-gui  /usr/local/bin/jadx-gui
          rm /tmp/jadx.zip

      # ── 10. ARM64 / AArch64 binary analysis tools ─────────────────────────
      - name: Install ARM64 binary analysis tools
        run: |
          sudo apt-get install -y \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            file \
            elfutils

      # ── 11. Capstone disassembly framework ────────────────────────────────
      - name: Install Capstone (C library + Python bindings)
        run: |
          sudo apt-get install -y libcapstone-dev
          pip install capstone

      # ── 12. Additional Python reverse-engineering libraries ───────────────
      - name: Install Python RE/analysis libraries
        run: |
          pip install \
            lief \
            pyelftools \
            androguard \
            r2pipe \
            frida-tools \
            pwntools

      # ── 12b. MCP server: fetch (used by the motofw-architect agent) ────────
      - name: Install mcp-server-fetch
        run: pip install mcp-server-fetch

      # ── 13. Clone Motorola CCC OTA source code ────────────────────────────
      - name: Clone com_motorola_ccc_ota into source_code/
        run: |
          if [ -d source_code ]; then
            echo "source_code/ already exists, pulling latest changes…"
            git -C source_code pull --ff-only
          else
            git clone https://github.com/Eduardob3677/com_motorola_ccc_ota.git source_code
          fi

      # ── 14. Verify environment ────────────────────────────────────────────
      - name: Verify installed tools
        run: |
          echo "=== Python ===" && python --version
          echo "=== pip    ===" && pip --version
          echo "=== Node   ===" && node --version
          echo "=== Java   ===" && java -version
          echo "=== curl   ===" && curl --version | head -1
          echo "=== wget   ===" && wget --version | head -1
          echo "=== jadx   ===" && jadx --version
          echo "=== smali  ===" && smali --version || true
          echo "=== capstone Python ===" && python -c "import capstone; print('capstone', capstone.__version__)"
          echo "=== lief   ===" && python -c "import lief; print('lief', lief.__version__)"
